name: Deploy EstetStudio Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-estetstudio-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup SSH key and known_hosts
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          echo "${{ secrets.PROD_PORT }}"

          ssh-keyscan -p "${{ secrets.PROD_PORT }}" -H "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Test SSH connection
        shell: bash
        run: |
          ssh -p "${{ secrets.PROD_PORT }}" \
          -o StrictHostKeyChecking=yes \
          "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
          "echo 'SSH connection successful'"

      - name: Ensure target directory exists
        shell: bash
        run: |
          ssh -p "${{ secrets.PROD_PORT }}" \
            "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
            "mkdir -p '${{ secrets.PROD_PATH }}'"

      - name: Deploy via rsync
        shell: bash
        run: |
          rsync -az --delete \
          --exclude='.git/' \
          --exclude='.github/' \
          --exclude='.gitignore' \
          --exclude='README.md' \
          --exclude='.DS_Store' \
          --exclude='node_modules/' \
          --exclude='npm-debug.log' \
          --exclude='yarn.lock' \
          --exclude='package-lock.json' \
          --exclude='composer.lock' \
          --exclude='vendor/bin/' \
          -e "ssh -p ${{ secrets.PROD_PORT }}" \
          ./build "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:${{ secrets.PROD_PATH }}/"

      - name: Fix directory and file permissions
        shell: bash
        run: |
          ssh -p "${{ secrets.PROD_PORT }}" \
            "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
            "find '${{ secrets.PROD_PATH }}' -type d -exec chmod 755 {} \; && \
             find '${{ secrets.PROD_PATH }}' -type f -exec chmod 644 {} \;"

      - name: Done
        run: echo "Deployment completed"
